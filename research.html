<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research — Algonova B2C Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="research">

  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>Algonova B2C Analytics</span>
    </div>
    <div class="topbar-right">
      <nav class="nav">
        <a href="/" class="nav-link" data-i18n="nav.bots">Bots</a>
        <a href="/dashboards" class="nav-link" data-i18n="nav.dashboards">Dashboards</a>
        <a href="/research" class="nav-link active" data-i18n="nav.research">Research</a>
        <a href="/glossary" class="nav-link" data-i18n="nav.glossary">Glossary</a>
        <a href="/team" class="nav-link" data-i18n="nav.team">Team</a>
        <a href="/faq" class="nav-link" data-i18n="nav.faq">FAQ</a>
      </nav>
      <div class="lang-switcher">
        <button class="lang-button" id="lang-button" aria-haspopup="listbox" aria-expanded="false" aria-label="Language">
          <span id="lang-current">EN</span>
          <span class="caret">▾</span>
        </button>
        <ul class="lang-menu" id="lang-menu" role="listbox" hidden></ul>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Sales <span class="accent">Research</span></h1>
    <p data-i18n="hero.research.subtitle">Findings published by the analytics team</p>
  </section>

  <div class="search-bar">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="m20 20-3.5-3.5"/>
    </svg>
    <input type="search" class="search-input" data-i18n-placeholder="search.placeholder.research" placeholder="Search research…" autocomplete="off">
  </div>

  <main class="content">

    <section class="bu-section">
      <h2 class="bu-title"><span class="bu-flag">🇮🇩</span> <span data-i18n="bu.indonesia">Indonesia</span></h2>
      <div class="grid">
        <div class="card card-empty">
          <span class="empty-text" data-i18n="empty.coming_soon">Coming soon</span>
        </div>
      </div>
    </section>

    <section class="bu-section">
      <h2 class="bu-title"><span class="bu-flag">🇲🇾</span> <span data-i18n="bu.malaysia">Malaysia</span></h2>
      <div class="grid">
        <div class="card card-empty">
          <span class="empty-text" data-i18n="empty.coming_soon">Coming soon</span>
        </div>
      </div>
    </section>

    <section class="bu-section">
      <h2 class="bu-title"><span class="bu-flag">🌎</span> <span data-i18n="bu.latam">LatAm</span></h2>
      <div class="grid">
        <div class="card card-empty">
          <span class="empty-text" data-i18n="empty.coming_soon">Coming soon</span>
        </div>
      </div>
    </section>

  </main>

  <div class="no-results" hidden data-i18n="search.no_results">Nothing found</div>

  <a class="bug-button" href="https://t.me/gotzir" target="_blank" rel="noopener noreferrer" data-i18n-title="bug.tooltip">
    <span class="bug-icon">🐞</span>
    <span data-i18n="bug.button">Found a bug?</span>
  </a>

  <footer class="page-footer" data-i18n="footer.version">v4 · 2026</footer>

  <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" defer></script>
  <script src="i18n.js" defer></script>
  <script src="search.js" defer></script>
  <script src="scroll-top.js" defer></script>

  <button class="scroll-top" type="button" aria-label="Scroll to top">↑</button>

</body>
</html>
